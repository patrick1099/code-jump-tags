name: Publish to VS Code Marketplace

# Auto-publish whenever a version tag (vX.Y.Z) is pushed.
# Release flow:
#   1. bump "version" in package.json
#   2. git commit -am "release: vX.Y.Z"
#   3. git tag vX.Y.Z && git push --follow-tags
# The tag push triggers this workflow, which publishes the version
# currently in package.json. Requires repo secret VSCE_PAT.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm run test:unit
      - name: Publish
        run: npx @vscode/vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
